# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.7.0"
  contains_version: ${{ "grep -iE" if unix else "findstr /c" }} "cookiecutter\s+${{ version | replace('.', '\\.') }}$"
  cov_fail_under: "98"

package:
  name: cookiecutter
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/cookiecutter/cookiecutter-${{ version }}.tar.gz
  sha256: b0bf50141201ebf022c95e3fa02a760b64e600b3675d6dabf97563425a62a707

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - cookiecutter = cookiecutter.__main__:main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - arrow
    - binaryornot >=0.4.4
    - click >=7.0,<9.0.0
    - jinja2 >=2.7,<4.0.0
    - python >=${{ python_min }}
    - python-slugify >=4.0.0
    - pyyaml >=5.3.1
    - requests >=2.23.0
    - rich

tests:
  - python:
      imports: cookiecutter
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      source:
        - tests/
    requirements:
      run:
        - coverage
        - freezegun
        - git
        - mercurial
        - pip
        - pytest
        - pytest-mock
        - python ${{ python_min }}.*
    script:
      - pip check
      - cookiecutter --version
      - cookiecutter --version | ${{ contains_version }}
      - pip list
      - pip list | ${{ contains_version }}
      - cookiecutter --help
      - coverage run --source cookiecutter --branch -m pytest -vv --color=yes --tb=long
      - coverage report --show-missing --skip-covered --fail-under=${{ cov_fail_under }}

about:
  license_file: LICENSE
  license: BSD-3-Clause
  homepage: https://pypi.org/project/cookiecutter
  repository: https://github.com/cookiecutter/cookiecutter
  documentation: https://cookiecutter.readthedocs.io
  summary: |-
    A command-line utility that creates projects from project templates, e.g.
    creating a Python package project from a Python package project template.

extra:
  recipe-maintainers:
    - bollwyvl
    - cadair
    - jakirkham
    - pydanny
